<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --font-display: 'General Sans', Inter, sans-serif;
      --font-body: 'Satoshi', Inter, sans-serif;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.35rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
      --space-12: 3rem;
      --color-bg: #f7f6f2;
      --color-surface: #fbfaf7;
      --color-surface-2: #f2efea;
      --color-surface-offset: #ebe6df;
      --color-text: #24211d;
      --color-text-muted: #706e69;
      --color-text-faint: #a5a39f;
      --color-primary: #0d6b73;
      --color-primary-hover: #0a575d;
      --color-primary-highlight: #d8e8e8;
      --color-success: #2f7d4c;
      --color-warning: #a96719;
      --color-error: #a53c52;
      --color-border: rgba(36,33,29,0.12);
      --color-divider: rgba(36,33,29,0.08);
      --shadow-sm: 0 1px 2px rgba(26,22,17,.05), 0 8px 24px rgba(26,22,17,.04);
      --shadow-md: 0 2px 6px rgba(26,22,17,.06), 0 18px 44px rgba(26,22,17,.08);
      --radius-sm: 0.5rem; --radius-md: 0.85rem; --radius-lg: 1.1rem; --radius-xl: 1.4rem;
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #201e1b;
      --color-surface-2: #26231f;
      --color-surface-offset: #2f2c27;
      --color-text: #e5e1da;
      --color-text-muted: #aaa59d;
      --color-text-faint: #767068;
      --color-primary: #5fa9b1;
      --color-primary-hover: #7ec3ca;
      --color-primary-highlight: #2b3a3c;
      --color-success: #6dbf88;
      --color-warning: #dfac62;
      --color-error: #de7187;
      --color-border: rgba(229,225,218,0.12);
      --color-divider: rgba(229,225,218,0.08);
      --shadow-sm: 0 1px 2px rgba(0,0,0,.25), 0 8px 24px rgba(0,0,0,.18);
      --shadow-md: 0 2px 6px rgba(0,0,0,.32), 0 18px 44px rgba(0,0,0,.28);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{min-height:100dvh;background:var(--color-bg);color:var(--color-text);font:400 var(--text-base)/1.55 var(--font-body)}
    button{font:inherit;border:none;background:none;color:inherit;cursor:pointer}
    table{border-collapse:collapse;width:100%}
    .app{max-width:1480px;margin:0 auto;padding:var(--space-6)}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);margin-bottom:var(--space-6)}
    .brand{display:flex;align-items:center;gap:var(--space-4)}
    .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg,var(--color-primary),color-mix(in srgb,var(--color-primary) 55%, #ffffff));display:grid;place-items:center;color:white;box-shadow:var(--shadow-sm)}
    .logo svg{width:22px;height:22px}
    .brand h1{font:700 var(--text-xl)/1.05 var(--font-display);letter-spacing:-.03em}
    .brand p{color:var(--color-text-muted);font-size:var(--text-sm)}
    .toolbar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
    .ghost-btn,.primary-btn,.secondary-btn,.danger-btn,.equal-btn{min-height:44px;padding:0 var(--space-4);border-radius:999px;font-size:var(--text-sm);font-weight:600;transition:.18s ease}
    .ghost-btn{border:1px solid var(--color-border);background:var(--color-surface);min-width:146px}
    .ghost-btn:hover{background:var(--color-surface-2)}
    .primary-btn{background:var(--color-primary);color:#fff}
    .primary-btn:hover{background:var(--color-primary-hover)}
    .secondary-btn{background:var(--color-primary-highlight);color:var(--color-primary)}
    .danger-btn{background:color-mix(in srgb,var(--color-error) 14%, var(--color-surface));color:var(--color-error)}
    .equal-btn{min-width:128px;justify-content:center;display:inline-flex;align-items:center}
    .overview,.stack{display:grid;gap:var(--space-6);align-items:start}
    .overview{grid-template-columns:1fr 1fr}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-4);padding:var(--space-5) var(--space-5) var(--space-4)}
    .card-title{font:700 var(--text-lg)/1.15 var(--font-display);letter-spacing:-.025em}
    .table-wrap{overflow:auto;padding:0 var(--space-4) var(--space-4)}
    th,td{text-align:left;padding:14px 12px;border-top:1px solid var(--color-divider);white-space:nowrap;font-size:var(--text-sm)}
    thead th{color:var(--color-text-muted);font-weight:600;font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.06em;background:color-mix(in srgb,var(--color-surface) 72%, var(--color-surface-2));position:sticky;top:0}
    tbody tr{cursor:pointer;transition:.16s ease}
    tbody tr:hover{background:color-mix(in srgb,var(--color-primary-highlight) 34%, var(--color-surface))}
    tbody tr.active{background:color-mix(in srgb,var(--color-primary-highlight) 72%, var(--color-surface));outline:1px solid color-mix(in srgb,var(--color-primary) 24%, transparent)}
